<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Al Watania Plast — Product Profiles</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#faf9f6;--border:#e2ddd6;--border2:#ccc8c0;
  --text:#1c1a18;--muted:#706860;--accent:#c94c28;--accent2:#e8722e;
  --green:#1a6b3a;--greenbg:#e8f5ee;--red:#8b1a1a;--redbg:#fdf0f0;
  --blue:#1a4a8a;--bluebg:#e8f0fc;--amber:#7a4e00;--amberbg:#fdf3e0;
  --purple:#5a1a8a;--purplebg:#f3e8fd;
  --r:8px;--rl:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.login-logo{font-size:1.2rem;font-weight:700;letter-spacing:.06em;text-align:center;margin-bottom:1.8rem;color:var(--text)}
.login-logo span{color:var(--accent)}
.login-field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.login-field label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.login-field input{padding:.6rem .8rem;border:1px solid var(--border2);border-radius:8px;font-size:.95rem;color:var(--text);background:var(--surface2)}
.login-field input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.login-btn{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.5rem}
.login-btn:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:.8rem;text-align:center;margin-top:.5rem;min-height:1.2rem}

/* ── APP LAYOUT ── */
#app{display:none;grid-template-columns:240px 1fr;grid-template-rows:54px 1fr;height:100vh;overflow:hidden;transition:grid-template-columns .2s ease}
#app.sb-collapsed{grid-template-columns:0px 1fr}
#app.sb-collapsed .sidebar{padding:0;border:none;overflow:hidden;min-width:0}
#app.visible{display:grid}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:.75rem;padding:0 1rem;background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.logo{font-size:.9rem;font-weight:700;letter-spacing:.06em;color:var(--text);flex-shrink:0}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:340px;position:relative}
.search-wrap input{width:100%;padding:.38rem .7rem .38rem 2rem;border:1px solid var(--border);background:var(--surface2);border-radius:6px;font-size:.83rem;color:var(--text)}
.si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.tb-right{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.tb-btn{padding:.32rem .65rem;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:.75rem;color:var(--text);display:flex;align-items:center;gap:.3rem;white-space:nowrap}
.tb-btn:hover{background:var(--surface2)}
.tb-btn.danger{color:var(--red);border-color:var(--red)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{background:var(--accent2)}
#sync-status{font-size:.7rem;font-family:monospace;color:var(--muted);padding:.22rem .5rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;white-space:nowrap}
.user-badge{font-size:.72rem;padding:.22rem .6rem;background:var(--purplebg);color:var(--purple);border-radius:20px;border:1px solid var(--purple);font-weight:600}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:.5rem 0;display:flex;flex-direction:column;transition:all .2s ease;min-width:0}
.app.sb-collapsed .sidebar{padding:0;border:none;overflow:hidden}
.sb-sec-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.5rem .8rem .25rem;font-weight:600}
.sb-item{display:flex;align-items:center;gap:.45rem;padding:.35rem .8rem;font-size:.8rem;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:var(--text)}
.sb-item:hover{background:var(--surface2)}
.sb-item.active{background:var(--accent);color:#fff;font-weight:500}
.sb-item.active .sb-count{background:rgba(255,255,255,.25);color:#fff}
.sb-icon{font-size:.95rem;flex-shrink:0;width:18px;text-align:center}
.sb-count{margin-left:auto;font-size:.65rem;background:var(--surface2);border:1px solid var(--border);padding:.1rem .38rem;border-radius:10px;color:var(--muted);min-width:22px;text-align:center}
.sb-div{height:1px;background:var(--border);margin:.3rem .8rem}

/* ── MAIN ── */
.main{overflow-y:auto;padding:1rem}
.grid-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:.5rem}
.grid-title{font-size:.88rem;font-weight:600}
.res-info{font-size:.72rem;color:var(--muted);font-family:monospace}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.65rem}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.09)}
.card-thumb{width:100%;height:115px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;border-bottom:1px solid var(--border)}
.card-thumb img{width:100%;height:100%;object-fit:contain;padding:4px}
.card-body{padding:.6rem .65rem;display:flex;flex-direction:column;gap:.22rem}
.card-name{font-size:.78rem;font-weight:600;line-height:1.3}
.card-sub{font-size:.65rem;color:var(--muted)}
.card-badges{display:flex;gap:.22rem;flex-wrap:wrap;margin-top:.2rem}
.badge{font-size:.6rem;padding:.1rem .35rem;border-radius:4px;font-family:monospace;font-weight:600}
.b-ok{background:var(--greenbg);color:var(--green)}
.b-no{background:var(--redbg);color:var(--red)}
.b-code{background:var(--amberbg);color:var(--amber)}
.b-prod{background:var(--bluebg);color:var(--blue)}
.b-edit{background:var(--purplebg);color:var(--purple)}
.b-trash{background:#fef0e0;color:#a05000}

/* ── PANEL ── */
.p-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.p-overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;right:0;top:0;bottom:0;width:min(660px,100vw);background:var(--surface);border-left:1px solid var(--border);z-index:51;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease}
.panel.open{transform:translateX(0)}
.p-hdr{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.p-hdr h2{font-size:.95rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-btn{padding:.3rem .6rem;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:.73rem;color:var(--text);display:flex;align-items:center;gap:.3rem;white-space:nowrap}
.ph-btn:hover{background:var(--surface2)}
.ph-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ph-btn.green{background:var(--greenbg);color:var(--green);border-color:var(--green)}
.ph-btn.red{background:var(--redbg);color:var(--red);border-color:var(--red)}
.ph-btn.blue{background:var(--bluebg);color:var(--blue);border-color:var(--blue)}
.p-body{overflow-y:auto;flex:1;padding:1.1rem}

/* ── SECTIONS ── */
.sec{margin-bottom:1.3rem}
.sec-hdr{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);padding-bottom:.35rem;margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem}
.sec-badge{font-size:.6rem;padding:.1rem .38rem;border-radius:4px;font-weight:700}
.sb-ok{background:var(--greenbg);color:var(--green)}
.sb-miss{background:var(--redbg);color:var(--red)}
.itbl{width:100%;border-collapse:collapse;font-size:.81rem}
.itbl td{padding:.3rem .1rem;vertical-align:top}
.itbl td:first-child{color:var(--muted);width:140px;font-size:.75rem;padding-right:.5rem}
.iv{color:var(--text)}
.iv.rtl{direction:rtl;text-align:right}
.iv.mono{font-family:monospace;font-size:.78rem}
.iv.empty{color:var(--muted);font-style:italic}
.bc-row{font-family:monospace;font-size:.77rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.35rem .6rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.3rem}
.bc-code{color:var(--amber);font-weight:700}
.bc-ar{color:var(--muted);font-size:.72rem;direction:rtl}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.18rem .5rem;font-size:.73rem}
.chip-wrap{display:flex;flex-wrap:wrap;gap:.3rem}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.prod-cell{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.45rem .6rem}
.prod-lbl{font-size:.62rem;color:var(--muted);margin-bottom:.12rem;text-transform:uppercase;letter-spacing:.05em}
.prod-val{font-size:.85rem;font-weight:600;font-family:monospace}
.prod-val.rtl{font-family:inherit;font-size:.78rem;direction:rtl}
.no-data{color:var(--muted);font-size:.78rem;font-style:italic;line-height:1.6}
.ratio-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:.4rem}

/* ── EDIT MODE ── */
.ef{display:flex;flex-direction:column;gap:.18rem;margin-bottom:.55rem}
.el{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.ei,.et,.es{width:100%;padding:.38rem .55rem;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-size:.81rem;font-family:inherit}
.ei:focus,.et:focus,.es:focus{outline:2px solid var(--accent);outline-offset:-1px}
.et{resize:vertical;min-height:60px}
.eg2{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.eg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem}

/* DataProducts linker */
.dp-link-box{background:var(--bluebg);border:1px solid var(--blue);border-radius:8px;padding:.6rem .8rem;margin-bottom:.8rem}
.dp-link-label{font-size:.7rem;color:var(--blue);font-weight:600;margin-bottom:.35rem}
.dp-link-val{font-size:.82rem;font-weight:600;color:var(--text);direction:rtl;margin-bottom:.35rem}
.dp-search-wrap{position:relative}
.dp-search-input{width:100%;padding:.38rem .55rem;border:1px solid var(--border2);border-radius:6px;font-size:.81rem;background:var(--surface);color:var(--text)}
.dp-dropdown{position:absolute;left:0;right:0;top:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;max-height:220px;overflow-y:auto;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.dp-opt{padding:.38rem .6rem;font-size:.79rem;cursor:pointer;display:flex;flex-direction:column;gap:.1rem;border-bottom:1px solid var(--border)}
.dp-opt:hover{background:var(--bluebg)}
.dp-opt-name{direction:rtl;font-weight:500}
.dp-opt-meta{font-size:.68rem;color:var(--muted);font-family:monospace}

/* Material ratio input */
.ratio-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem}
.ratio-row input{flex:1;padding:.35rem .5rem;border:1px solid var(--border2);border-radius:5px;background:var(--surface);color:var(--text);font-size:.79rem;font-family:monospace}
.ratio-colon{font-size:.9rem;color:var(--muted);flex-shrink:0}
.ratio-pct{font-size:.72rem;color:var(--muted);font-family:monospace;white-space:nowrap;flex-shrink:0;min-width:70px}
.add-row-btn{font-size:.72rem;color:var(--blue);background:none;border:1px dashed var(--border2);border-radius:6px;padding:.3rem .6rem;cursor:pointer;width:100%;margin-top:.25rem}
.add-row-btn:hover{background:var(--bluebg)}
.del-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:.28rem .45rem;cursor:pointer;color:var(--red);font-size:.75rem}
.del-btn:hover{background:var(--redbg)}

/* Save bar */
.save-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:.65rem 0;margin-top:.5rem;display:flex;gap:.5rem}
.save-btn{flex:1;padding:.5rem;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer;justify-content:center}
.save-btn:hover{background:var(--accent2)}
.cancel-btn{padding:.5rem .9rem;border:1px solid var(--border);border-radius:7px;background:none;cursor:pointer;font-size:.82rem;color:var(--text)}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:1.8rem;width:min(480px,90vw);max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:1.2rem}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.2rem}
.btn{padding:.45rem .9rem;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface2)}
.btn-green{background:var(--green);color:#fff}

/* ── SETTINGS / ADMIN ── */
.settings-panel{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80;display:none;align-items:flex-start;justify-content:flex-end}
.settings-panel.open{display:flex}
.settings-box{background:var(--surface);width:min(420px,100vw);height:100vh;overflow-y:auto;border-left:1px solid var(--border);padding:1.2rem}
.settings-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.settings-hdr h3{font-size:.95rem;font-weight:700}
.user-row{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
.user-name{font-size:.85rem;font-weight:600;flex:1}
.user-role{font-size:.7rem;padding:.18rem .5rem;border-radius:10px;font-weight:600}
.role-admin{background:var(--purplebg);color:var(--purple)}
.role-viewer{background:var(--greenbg);color:var(--green)}
.toggle-role{font-size:.7rem;padding:.22rem .5rem;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:none;color:var(--text)}
.toggle-role:hover{background:var(--surface2)}
.del-user-btn{font-size:.7rem;padding:.22rem .45rem;border:1px solid var(--red);border-radius:5px;cursor:pointer;background:none;color:var(--red)}

/* ── ACTIVITY LOG ── */
.log-row{padding:.45rem .6rem;border-bottom:1px solid var(--border);font-size:.78rem;display:grid;grid-template-columns:auto 1fr auto;gap:.5rem;align-items:start}
.log-user{font-weight:600;color:var(--purple)}
.log-action{color:var(--text)}
.log-time{font-size:.68rem;color:var(--muted);font-family:monospace;white-space:nowrap}

/* ── PRINT ── */
.print-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:1rem}
.print-overlay.open{display:flex}
.print-wrap{width:210mm;max-width:100%}
.print-actions{background:#222;padding:.55rem 1rem;display:flex;gap:.5rem;align-items:center;border-radius:8px 8px 0 0}
.print-card{background:#fff;color:#111;width:210mm;min-height:160mm;padding:12mm;font-family:'Segoe UI',sans-serif;font-size:9.5pt;line-height:1.45}
.pc-logo{font-size:13pt;font-weight:700;color:#c94c28;letter-spacing:.06em}
.pc-hdr{display:flex;justify-content:space-between;border-bottom:2pt solid #c94c28;padding-bottom:5mm;margin-bottom:5mm}
.pc-title{font-size:15pt;font-weight:700;margin:.4rem 0 .25rem}
.pc-sec{margin-bottom:4mm}
.pc-sec-title{font-size:8.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#666;border-bottom:1pt solid #ddd;padding-bottom:2pt;margin-bottom:2.5mm}
.pc-tbl{width:100%;border-collapse:collapse;font-size:8.5pt}
.pc-tbl td{padding:2pt 3pt;border-bottom:1pt solid #eee;vertical-align:top}
.pc-tbl td:first-child{color:#666;width:120pt}
.pc-tbl th{background:#f5f5f5;padding:2.5pt 3pt;font-size:8pt;text-align:left;border-bottom:1pt solid #ccc;color:#444}
.pc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:3mm}
.pc-box{border:1pt solid #ddd;border-radius:3pt;padding:2.5mm;background:#fafafa}
.pc-box-lbl{font-size:7pt;color:#888;text-transform:uppercase;letter-spacing:.05em}
.pc-box-val{font-size:10pt;font-weight:700}
.pc-footer{border-top:1pt solid #ddd;padding-top:2.5mm;font-size:7pt;color:#888;display:flex;justify-content:space-between;margin-top:4mm}
.pnf{color:#bbb;font-style:italic}

@media print{
  body>*:not(.print-overlay){display:none!important}
  .print-overlay{display:block!important;position:static;background:none;padding:0}
  .print-actions{display:none!important}
  .print-wrap{width:100%}
  .print-card{box-shadow:none;padding:8mm}
}
mark{background:#fff3a0;border-radius:2px;padding:0 1px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;z-index:300;transition:opacity .4s;pointer-events:none}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Al Watania <span>Plast</span><br><small style="font-size:.65rem;color:var(--muted);font-weight:400;letter-spacing:.05em">Product Profile System</small></div>
    <div class="login-field"><label>Username</label><input type="text" id="lu" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-field"><label>Password</label><input type="password" id="lp" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="app">
  <div class="topbar">
    <button class="tb-btn" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar" style="padding:.32rem .5rem;flex-shrink:0">☰</button>
    <div class="logo">Al Watania <span>Plast</span></div>
    <div class="search-wrap">
      <svg class="si" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
      <input type="text" id="search" placeholder="Search name, barcode, code…" oninput="onSearch()">
    </div>
    <div class="tb-right">
      <span id="sync-status" class="tb-btn">⊘ Local</span>
      <span class="user-badge" id="user-badge">—</span>
      <button class="tb-btn" onclick="openLog()">📋 Activity</button>
      <button class="tb-btn primary" id="add-product-btn" onclick="openAddProduct()" style="display:none">+ Add Product</button>
      <button class="tb-btn" onclick="openSettings()" id="settings-btn" style="display:none">⚙ Settings</button>
      <button class="tb-btn danger" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-sec-title">Filter</div>
    <button class="sb-item active" onclick="setFilter('all',this)"><span class="sb-icon">📋</span>All products<span class="sb-count" id="cnt-all">437</span></button>
    <button class="sb-item" onclick="setFilter('matched',this)"><span class="sb-icon">✓</span>With barcode<span class="sb-count" id="cnt-matched">0</span></button>
    <button class="sb-item" onclick="setFilter('production',this)"><span class="sb-icon">⚙</span>With prod. data<span class="sb-count" id="cnt-prod">0</span></button>
    <button class="sb-item" onclick="setFilter('edited',this)"><span class="sb-icon">✏</span>Edited<span class="sb-count" id="cnt-edited">0</span></button>
    <button class="sb-item" onclick="setFilter('unmatched',this)"><span class="sb-icon">○</span>Website only<span class="sb-count" id="cnt-unmatched">0</span></button>
    <button class="sb-item" onclick="setFilter('trash',this)"><span class="sb-icon">🗑</span>Trash<span class="sb-count" id="cnt-trash">0</span></button>
    <div class="sb-div"></div>
    <div class="sb-sec-title">Category</div>
    <div id="cat-list"></div>
  </aside>
  <main class="main">
    <div class="grid-hdr">
      <div class="grid-title" id="grid-title">All Products</div>
      <div class="res-info" id="res-info"></div>
    </div>
    <div class="grid" id="product-grid"></div>
  </main>

<div class="modal-overlay" id="add-modal">

// SHA-256 helper
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Default admin — password hash stored, never plain text
const DEFAULT_USERS=[{username:'yousef',hash:'',role:'admin'}]; // hash set on first load

let SESSION=null; // {username, role}

async function initAuth(){
  // Restore session from sessionStorage first
  const s=sessionStorage.getItem('awp_session');
  if(s){try{SESSION=JSON.parse(s);}catch{}}
  if(SESSION){showApp();return;}
  // Pre-load cloud store so users list is ready at login
  setSyncStatus('loading','Loading…');
  if(IS_NETLIFY){
    try{
      const r=await fetch(API_URL);
      if(r.ok){
        const data=await r.json();
        _store=Object.assign({},getLocalStore(),data||{});
        setLocalStore(_store);_storeLoaded=true;
        setSyncStatus('ok','Ready');
        if(!_store._users){
          const h=await sha256('6666');
          _store._users=[{username:'yousef',hash:h,role:'admin'}];
          saveStore(_store);
        }
      }
    }catch(e){
      _storeLoaded=true;_store=getLocalStore();
      setSyncStatus('error','Offline – local only');
    }
  } else {
    _storeLoaded=true;_store=getLocalStore();
    if(!_store._users){
      const h=await sha256('6666');
      _store._users=[{username:'yousef',hash:h,role:'admin'}];
      saveStore(_store);
    }
    setSyncStatus('offline','Local only');
  }
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const errEl=document.getElementById('login-err');
  if(!u||!p){errEl.textContent='Please enter username and password.';return;}
  const btn=document.querySelector('.login-btn');
  btn.textContent='Signing in…';btn.disabled=true;
  // If cloud not loaded yet (slow connection) wait for it
  if(IS_NETLIFY&&!_storeLoaded){
    try{
      const r=await fetch(API_URL);
      if(r.ok){
        const data=await r.json();
        _store=Object.assign({},getLocalStore(),data||{});
        setLocalStore(_store);_storeLoaded=true;
      }
    }catch(e){_storeLoaded=true;_store=getLocalStore();}
  }
  const h=await sha256(p);
  const users=(getStore()._users)||[];
  const user=users.find(x=>x.username.toLowerCase()===u&&x.hash===h);
  btn.textContent='Sign in';btn.disabled=false;
  if(!user){
    errEl.textContent='Invalid credentials.';
    document.getElementById('lp').value='';
    return;
  }
  SESSION={username:user.username,role:user.role};
  sessionStorage.setItem('awp_session',JSON.stringify(SESSION));
  showApp();
}

function doLogout(){
  SESSION=null;
  sessionStorage.removeItem('awp_session');
  location.reload();
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-badge').textContent=SESSION.username+' ('+SESSION.role+')';
  restoreSidebarState();
  if(SESSION.role==='admin'){
    document.getElementById('settings-btn').style.display='';
    document.getElementById('add-product-btn').style.display='';
  }
  init();
}

function isAdmin(){return SESSION&&SESSION.role==='admin';}
function canEdit(){return SESSION&&(SESSION.role==='admin'||SESSION.role==='editor');}

let _saving=0;

function setSyncStatus(state,msg){
  const el=document.getElementById('sync-status');
  if(!el)return;
  const icons={ok:'☁',saving:'↑',error:'⚠',offline:'⊘',loading:'…'};
  el.textContent=(icons[state]||'')+' '+msg;
  el.style.color=state==='error'?'var(--red)':state==='saving'?'var(--amber)':state==='ok'?'var(--green)':'var(--muted)';
}
async function loadCloud(){
  if(!IS_NETLIFY){_storeLoaded=true;setSyncStatus('offline','Local only');return;}
  setSyncStatus('loading','Syncing…');
  try{
    const r=await fetch(API_URL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const local=getLocalStore();
    _store=Object.assign({},local,data||{});
    setLocalStore(_store);
    _storeLoaded=true;
    setSyncStatus('ok','Synced');
    updateCounts();renderGrid();
  }catch(e){
    _storeLoaded=true;_store=getLocalStore();
    setSyncStatus('error','Cloud unavailable – using local');
  }
}
async function pushCloud(store){
  if(!IS_NETLIFY)return;
  _saving++;setSyncStatus('saving','Saving…');
  try{
    const r=await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(store)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    _saving--;if(!_saving)setSyncStatus('ok','Saved ✓');
  }catch(e){_saving--;setSyncStatus('error','Cloud save failed – saved locally');}
}
function getLocalStore(){try{const d=localStorage.getItem('awp_profiles');return d?JSON.parse(d):{};}catch{return {};}}
function setLocalStore(s){try{localStorage.setItem('awp_profiles',JSON.stringify(s));}catch{}}
function getStore(){if(_storeLoaded&&_store!==null)return _store;return getLocalStore();}
function saveStore(s){_store=s;setLocalStore(s);pushCloud(s);}
function getProfile(id){return(getStore()[id])||{};}
function saveProfile(id,data){const s=getStore();s[id]=data;saveStore(s);}
// Editable-identity overrides: reflect a saved custom English name onto the product object
// so the grid, search, hero and view all show it consistently.
function applyOverrides(){
  const s=getStore();
  allProducts.forEach(p=>{
    const pr=s[p.id];
    if(pr&&pr._enName){ if(p._origEn===undefined)p._origEn=p.en; p.en=pr._enName; }
    else if(p._origEn!==undefined){ p.en=p._origEn; }
    if(pr&&pr._catOverride){ if(p._origCat===undefined)p._origCat=p.cat; p.cat=pr._catOverride; }
    else if(p._origCat!==undefined){ p.cat=p._origCat; }
    if(pr&&pr._subOverride){ if(p._origSub===undefined)p._origSub=p.sub; p.sub=pr._subOverride; }
    else if(p._origSub!==undefined){ p.sub=p._origSub; }
  });
}

// Image upload: read file, resize to ~500px, store as base64 in a hidden field
function handleImgUpload(input){
  const f=input.files&&input.files[0];
  if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=500;let w=img.width,h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let data;try{data=c.toDataURL('image/jpeg',0.82);}catch(e){data=ev.target.result;}
      const hid=document.getElementById('e_image_data');if(hid)hid.value=data;
      const pv=document.getElementById('e_img_prev');if(pv)pv.innerHTML='<img src="'+data+'" style="width:100%;height:100%;object-fit:contain">';
      unsaved=true;
    };
    img.src=ev.target.result;
  };
  rd.readAsDataURL(f);
}
function clearProdImg(){
  const hid=document.getElementById('e_image_data');if(hid)hid.value='';
  const pv=document.getElementById('e_img_prev');if(pv)pv.innerHTML='<span style="font-size:1.6rem">🖼️</span>';
  unsaved=true;
}

// Batched field-level change logging (one store write)
function logChanges(name,list){
  if(!list||!list.length)return;
  const s=getStore();
  if(!s._log)s._log=[];
  const t=new Date().toLocaleString('en-GB');
  list.forEach(c=>{
    s._log.unshift({user:SESSION.username,action:'changed '+c.field,target:name+': "'+c.from+'" → "'+c.to+'"',time:t});
  });
  if(s._log.length>500)s._log=s._log.slice(0,500);
  saveStore(s);
}

// ══ MATCHING ENGINE ════════════════════════════════════════════════════
const EN_AR_MAP=[
  [/filo basin/i,['طشت فيلو 1','طشت فيلو2','طشت فيلو3','طشت فيلو4']],
  [/lina basin/i,['طشت لينا 1','طشت لينا 2','طشت لينا 3','طشت لينا 4']],
  [/rotana basin/i,['طشت روتانا 5']],
  [/filo magour/i,['ماجور فيلو1','ماجور فيلو2','ماجور فيلو3','ماجور فيلو4']],
  [/lina magour/i,['ماجور لينا 1','ماجور لينا 2','ماجور لينا 3','ماجور لينا 4']],
  [/rotana magour/i,['ماجور روتانا 5']],
  [/nancy bucket/i,['جردل نانسى بالغطاء']],[/kimo bucket/i,['جردل كيمو']],
  [/daloaa bucket/i,['جردل دلوعه ستانلس']],[/royal bucket/i,['جردل رويال']],
  [/turkey bucket|turkish bucket/i,['جردل تركى']],[/tornado bucket/i,['جردل تورنيدو']],
  [/japanese bucket/i,['جردل سامسونج']],[/samsung bucket/i,['جردل سامسونج']],
  [/french bucket/i,['جردل فرنساوى استانلس']],[/automatic bucket/i,['جردل اتوماتيك استانلس']],
  [/super spin/i,['جردل سوبر سبين']],[/super clean/i,['جردل سوبر كلين']],
  [/lina bucket/i,['جردل لينا']],[/rocky dust bin/i,['زبالة روكى']],
  [/loaloaa dust bin/i,['زبالة لؤلؤه']],[/grand dust bin/i,['زبالة جراند']],
  [/magy dustbin/i,['زبالة ماجى1']],[/dream dustbin/i,['زبالة دريم 1']],
  [/toofy dustbin 1/i,['زباله توفي 1']],[/toofy dustbin 2/i,['زباله توفي 2']],
  [/toofy dustbin 3/i,['زباله توفي 3']],[/tokyo dustbin/i,['زبالة طوكيو 1']],
  [/ratan 3 bin/i,['زبالة راتان3']],[/ratan 2 bin/i,['زبالة راتان2']],[/ratan 1 bin/i,['زبالة راتان1']],
  [/new rocka/i,['زبالة نيو روكا']],[/grand rocka/i,['زباله جراند روكا']],
];

function findBC(p){
  const pid=getProfile(p.id);
  if(pid._arName){const d=BARCODES[pid._arName];if(d)return[pid._arName,d];}
  const en=p.en||'';
  for(const[re,ars]of EN_AR_MAP){
    if(re.test(en)){for(const ar of ars){if(BARCODES[ar])return[ar,BARCODES[ar]];}}
  }
  return[null,null];
}

function findMould(p){
  const prof=getProfile(p.id);
  // Use linked DataProducts row if set
  if(prof._dpIdx!==undefined&&prof._dpIdx!==null){
    const m=MOULDS[prof._dpIdx];
    if(m)return[m.n,m];
  }
  // Auto-match by name similarity
  const en=(p.en||'').toLowerCase();
  const arMap=[
    [/filo basin/i,['طشت فيلو 1','طشت فيلو2','طشت فيلو3','طشت فيلو4']],
    [/lina basin/i,['طشت لينا 1','طشت لينا 2','طشت لينا 3','طشت لينا 4']],
    [/nancy bucket/i,['جسم جردل نانسي']],[/kimo bucket/i,['جسم جردل كيمو']],
    [/daloaa bucket/i,['جسم جردل دلوعة']],[/royal bucket/i,['جسم جردل رويال']],
    [/japanese bucket/i,['جسم جردل ياباني']],[/tornado bucket/i,['جسم جردل تورنيدو ']],
    [/automatic bucket/i,['جسم جردل اوتوماتيك']],[/super spin/i,['جسم جردل سوبر سبين']],
    [/turkish bucket|turkey bucket/i,['جسم جردل تركي ']],
  ];
  for(const[re,ars]of arMap){
    if(re.test(en)){for(const ar of ars){const m=MOULDS.find(x=>x.n===ar);if(m)return[ar,m];}}
  }
  return[null,null];
}

// ══ STATE ═════════════════════════════════════════════════════════════
let currentFilter='all',currentCat='',searchQ='',currentPid=null,editMode=false,unsaved=false;
let allProducts=[...PRODUCTS]; // may include custom-added products

function getActiveProducts(){return allProducts.filter(p=>!getProfile(p.id)._trashed);}
function getTrashedProducts(){return allProducts.filter(p=>getProfile(p.id)._trashed);}

// ══ INIT ═══════════════════════════════════════════════════════════════
function init(){
  applyOverrides();buildCatList();updateCounts();renderGrid();
  loadCloud().then(()=>{
    // Re-load custom products from store
    const s=getStore();
    if(s._customProducts){
      s._customProducts.forEach(cp=>{if(!allProducts.find(p=>p.id===cp.id))allProducts.push(cp);});
    }
    applyOverrides();buildCatList();updateCounts();renderGrid();
  });
}
function buildCatList(){
  const cats={};getActiveProducts().forEach(p=>{cats[p.cat]=(cats[p.cat]||0)+1;});
  const el=document.getElementById('cat-list');
  el.innerHTML='<button class="sb-item" onclick="setCat(\'\',this)"><span class="sb-icon">🔍</span>All<span class="sb-count">'+getActiveProducts().length+'</span></button>';
  Object.entries(cats).sort().forEach(([c,n])=>{
    const b=document.createElement('button');b.className='sb-item';b.onclick=()=>setCat(c,b);
    b.innerHTML=`<span class="sb-icon">${CAT_ICONS[c]||'📦'}</span>${c}<span class="sb-count">${n}</span>`;
    el.appendChild(b);
  });
}
function updateCounts(){
  const s=getStore();
  let matched=0,prod=0,edited=0,unmatched=0,trash=0;
  allProducts.forEach(p=>{
    const pr=s[p.id]||{};
    if(pr._trashed){trash++;return;}
    const[ar]=findBC(p);const[,md]=findMould(p);
    if(ar)matched++;else unmatched++;
    if(md||pr._dpIdx!==undefined)prod++;
    if(Object.keys(pr).filter(k=>!k.startsWith('_')).length>0)edited++;
  });
  document.getElementById('cnt-all').textContent=getActiveProducts().length;
  document.getElementById('cnt-matched').textContent=matched;
  document.getElementById('cnt-prod').textContent=prod;
  document.getElementById('cnt-edited').textContent=edited;
  document.getElementById('cnt-unmatched').textContent=unmatched;
  document.getElementById('cnt-trash').textContent=trash;
}

// ══ FILTER/SEARCH ══════════════════════════════════════════════════════
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderGrid();}
function setCat(c,el){currentCat=c;document.querySelectorAll('[onclick^="setCat"]').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderGrid();}
function onSearch(){searchQ=document.getElementById('search').value.trim().toLowerCase();renderGrid();}

function getFiltered(){
  const s=getStore();
  const pool=currentFilter==='trash'?getTrashedProducts():getActiveProducts();
  return pool.filter(p=>{
    if(currentCat&&p.cat!==currentCat)return false;
    const[ar,d]=findBC(p);const[,md]=findMould(p);const pr=s[p.id]||{};
    const hasEdit=Object.keys(pr).filter(k=>!k.startsWith('_')).length>0;
    if(currentFilter==='matched'&&!ar)return false;
    if(currentFilter==='production'&&!md&&pr._dpIdx===undefined)return false;
    if(currentFilter==='edited'&&!hasEdit)return false;
    if(currentFilter==='unmatched'&&ar)return false;
    if(searchQ){
      const inEn=(p.en||'').toLowerCase().includes(searchQ);
      const inCat=(p.cat||'').toLowerCase().includes(searchQ);
      let inBC=false;
      if(ar&&d){inBC=(d.bc||[]).some(b=>b.includes(searchQ))||(d.codes||[]).some(c=>c.toLowerCase().includes(searchQ))||ar.includes(searchQ);}
      if(!inEn&&!inCat&&!inBC)return false;
    }
    return true;
  });
}

// ══ RENDER GRID ════════════════════════════════════════════════════════
function hl(t){
  if(!searchQ)return t;
  const re=new RegExp(searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return String(t).replace(re,m=>`<mark>${m}</mark>`);
}
function renderGrid(){
  const filtered=getFiltered();const s=getStore();
  document.getElementById('res-info').textContent=filtered.length+' of '+allProducts.length+' shown';
  const grid=document.getElementById('product-grid');
  if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2.5rem;color:var(--muted)">No products match.</div>';return;}
  grid.innerHTML=filtered.map(p=>{
    const[ar,d]=findBC(p);const[,md]=findMould(p);const pr=s[p.id]||{};
    const hasEdit=Object.keys(pr).filter(k=>!k.startsWith('_')).length>0;
    const isTrashed=pr._trashed;
    const colCount=d?(d.colours||[]).length:0;
    const firstCode=d?(d.codes||[])[0]:'';
    return`<div class="card" onclick="openPanel(${esc(JSON.stringify(p.id))})">
      ${cardThumb(p)}
      <div class="card-body">
        <div class="card-name">${hl(p.en)}</div>
        <div class="card-sub">${p.sub}</div>
        <div class="card-badges">
          ${isTrashed?'<span class="badge b-trash">🗑 trash</span>':''}
          ${ar?'<span class="badge b-ok">✓</span>':'<span class="badge b-no">no barcode</span>'}
          ${firstCode?`<span class="badge b-code">${firstCode}</span>`:''}
          ${(md||pr._dpIdx!==undefined)?'<span class="badge b-prod">⚙</span>':''}
          ${colCount>0?`<span class="badge b-edit">${colCount+1} col</span>`:''}
          ${hasEdit?'<span class="badge b-edit">✏</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══ PANEL ═════════════════════════════════════════════════════════════
function openPanel(id){
  currentPid=id;editMode=false;unsaved=false;
  const p=allProducts.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('panel-title').textContent=p.en;
  const pr=getProfile(id);const isTrashed=pr._trashed;
  // Buttons visibility based on role and trash state
  document.getElementById('edit-btn').style.display=(canEdit()&&!isTrashed)?'':'none';
  document.getElementById('delete-btn').style.display=(canEdit()&&!isTrashed)?'':'none';
  document.getElementById('restore-btn').style.display=(canEdit()&&isTrashed)?'':'none';
  document.getElementById('perm-del-btn').style.display=(isAdmin()&&isTrashed)?'':'none';
  document.getElementById('edit-btn').textContent='✏ Edit';
  document.getElementById('edit-btn').classList.remove('active');
  renderView(id);
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closePanel(){
  if(unsaved&&!confirm('Discard unsaved changes?'))return;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  currentPid=null;editMode=false;unsaved=false;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

function toggleEdit(){
  if(editMode){if(unsaved&&!confirm('Discard changes?'))return;editMode=false;unsaved=false;document.getElementById('edit-btn').textContent='✏ Edit';document.getElementById('edit-btn').classList.remove('active');renderView(currentPid);}
  else{editMode=true;document.getElementById('edit-btn').textContent='← View';document.getElementById('edit-btn').classList.add('active');renderEdit(currentPid);}
}

// ══ VIEW MODE ═════════════════════════════════════════════════════════
function sec(title,status,content){
  const badge=status==='ok'?'<span class="sec-badge sb-ok">✓ matched</span>':status==='miss'?'<span class="sec-badge sb-miss">no data</span>':'';
  return`<div class="sec"><div class="sec-hdr">${title} ${badge}</div>${content}</div>`;
}
function cell(lbl,val){return`<div class="prod-cell"><div class="prod-lbl">${lbl}</div><div class="prod-val">${val||'—'}</div></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function empty(v){return!v||v==='nan'||v==='';}

function renderMaterialRatios(mat,savedRatios){
  // Parse material string like "2مخفف 25 \\ 3 مركز 44" OR use saved ratios
  if(savedRatios&&savedRatios.length){
    const total=savedRatios.reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
    const bars=savedRatios.map(r=>{const pct=total?Math.round((parseFloat(r.qty)||0)/total*100):0;return`<div style="flex:${parseFloat(r.qty)||1};background:${r.color||'#4a90d9'}" title="${r.name} ${pct}%"></div>`;}).join('');
    const rows=savedRatios.map(r=>{const pct=total?Math.round((parseFloat(r.qty)||0)/total*100):0;return`<div style="display:flex;align-items:center;gap:.4rem;font-size:.78rem;margin-bottom:.2rem"><span style="width:10px;height:10px;border-radius:50%;background:${r.color||'#4a90d9'};flex-shrink:0"></span><span>${esc(r.name)}</span><span style="margin-left:auto;font-family:monospace;color:var(--muted)">${r.qty} → ${pct}%</span></div>`;}).join('');
    return`<div class="ratio-bar">${bars}</div><div style="margin-top:.5rem">${rows}</div>`;
  }
  // Show raw material string
  if(!empty(mat))return`<div style="direction:rtl;font-family:monospace;font-size:.78rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.35rem .55rem">${esc(mat)}</div>`;
  return'<span class="no-data">Not entered</span>';
}

function renderView(id){
  const p=allProducts.find(x=>x.id===id);
  const[ar,d]=findBC(p);
  const[mn,md]=findMould(p);
  const pr=getProfile(id);
  const cc=CAT_COLORS[p.cat]||'#888';

  let html=panelHero(p);

  // Identification
  const _arName=pr._arName||ar;
  const _code=pr._codeOverride||(d&&(d.codes||[])[0])||'';
  const _barcode=pr._barcodeOverride||(d&&(d.bc||[])[0])||'';
  html+=sec('Identification','',`<table class="itbl">
    <tr><td>English name</td><td class="iv">${esc(pr._enName||p.en)}</td></tr>
    ${_arName?`<tr><td>Arabic name</td><td class="iv rtl">${esc(_arName)}</td></tr>`:''}
    <tr><td>Category</td><td class="iv">${esc(p.cat)} › ${esc(p.sub)}</td></tr>
    ${_code?`<tr><td>Internal code</td><td class="iv mono">${esc(_code)}</td></tr>`:''}
    ${_barcode?`<tr><td>Barcode</td><td class="iv mono">${esc(_barcode)}</td></tr>`:''}
    <tr><td>Website ID</td><td class="iv mono">#${id}</td></tr>
    ${pr.notes?`<tr><td>Notes</td><td class="iv">${esc(pr.notes)}</td></tr>`:''}
    ${pr._lastEditBy?`<tr><td>Last edited by</td><td class="iv"><span style="color:var(--purple);font-weight:600">${esc(pr._lastEditBy)}</span> · <span style="color:var(--muted);font-size:.75rem">${esc(pr._lastEditAt||'')}</span></td></tr>`:''}
  </table>`);

  // Specs
  const w=pr.weight||'',dim=pr.dimensions||'',vol=pr.volume||'';
  html+=sec('Technical specifications','',`<table class="itbl">
    <tr><td>Weight (kg)</td><td class="iv ${w?'':'empty'}">${w||'— not entered'}</td></tr>
    <tr><td>Dimensions (cm)</td><td class="iv ${dim?'':'empty'}">${dim||'— not entered'}</td></tr>
    <tr><td>Volume (cm³)</td><td class="iv ${vol?'':'empty'}">${vol||'— not entered'}</td></tr>
  </table>`);

  // Barcodes
  if(d){
    const rows=(d.codes||[]).map((c,i)=>`<div class="bc-row"><span class="bc-code">${c||'—'}</span><span>${(d.bc||[])[i]||''}</span>${(d.names||[])[i]?`<span class="bc-ar">${(d.names||[])[i]}</span>`:''}</div>`).join('');
    html+=sec('Barcodes & internal codes','ok',rows);
  } else {
    html+=sec('Barcodes & internal codes','miss','<p class="no-data">No match found. Enter manually in Edit mode or link via Arabic name.</p>');
  }

  // Colour variants from barcode sheet
  if(d&&(d.colours||[]).length>0){
    html+=sec('Colour variants','',`<div class="chip-wrap">${d.colours.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>`);
  }

  // Production data — BOM rows
  const bom=pr.bom||[];
  if(bom.length){
    const bomHtml=bom.map((row,i)=>{
      const mData=row._dpIdx!==undefined?MOULDS[row._dpIdx]||{}:{};
      const colours=row.colours||(mData.colours)||[];
      const machines=row.machines||(mData.machines)||[];
      const ratios=row.materialRatios||(mData.mat?[{name:mData.mat,qty:'1'}]:[]);
      const total=ratios.reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
      return`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.65rem .8rem;margin-bottom:.6rem">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.06em">Component ${i+1}${row._dpIdx!==undefined?` — <span style="color:var(--blue)">${esc(MOULDS[row._dpIdx]?.n||'')}</span>`:''}</div>
        <div class="prod-grid">
          ${cell('Mould name',row.mouldName||mData.mc||mData.n||'—')}
          ${cell('Cycle time',(row.cycleTime||mData.ct||'—')+'s')}
          ${cell('Pieces / cycle',row.piecesCycle||mData.pc||'—')}
          ${cell('Part weight',row.partWeight?(row.partWeight+' kg'):'—')}
          ${cell('Machines',machines.length?machines.join(', '):'—')}
        </div>
        ${ratios.length?`<div style="margin-top:.5rem"><div class="prod-lbl" style="margin-bottom:.3rem">Material mix</div>${renderMaterialRatios(mData.mat,row.materialRatios)}</div>`:''}
        ${colours.length?`<div style="margin-top:.4rem"><div class="prod-lbl">Colours</div><div class="chip-wrap" style="margin-top:.25rem">${colours.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div></div>`:''}
      </div>`;
    }).join('');
    html+=sec('Bill of materials (BOM)','ok',bomHtml);
  } else {
    html+=sec('Bill of materials (BOM)','miss','<p class="no-data">No BOM components entered. Use Edit mode to add mould components.</p>');
  }

  // Packaging
  const pkg=pr.packaging||{};
  html+=sec('Packaging & pallet','',`<table class="itbl">
    <tr><td>Inner packaging</td><td class="iv ${pkg.inner?'':'empty'}">${pkg.inner||'— not entered'}</td></tr>
    <tr><td>Carton box</td><td class="iv ${pkg.carton?'':'empty'}">${pkg.carton||'— not entered'}</td></tr>
    <tr><td>Pallet config</td><td class="iv ${pkg.pallet?'':'empty'}">${pkg.pallet||'— not entered'}</td></tr>
    <tr><td>Units per pallet</td><td class="iv ${pkg.unitsPerPallet?'':'empty'}">${pkg.unitsPerPallet||'— not entered'}</td></tr>
  </table>`);

  // Quality
  const q=pr.quality||{};
  html+=sec('Quality requirements','',`<table class="itbl">
    <tr><td>Tolerances</td><td class="iv ${q.dimTol?'':'empty'}">${q.dimTol||'— not entered'}</td></tr>
    <tr><td>Visual criteria</td><td class="iv ${q.visual?'':'empty'}">${q.visual||'— not entered'}</td></tr>
    <tr><td>Functional tests</td><td class="iv ${q.functional?'':'empty'}">${q.functional||'— not entered'}</td></tr>
  </table>`);

  // Assembly steps
  const steps=pr.assemblySteps||[];
  html+=sec('Assembly steps','',steps.length?`<ol style="padding-left:1.1rem;font-size:.8rem;line-height:1.8">${steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`:'<p class="no-data">Not documented yet.</p>');

  // Revisions
  const revs=pr.revisions||[];
  html+=sec('Revision history','',revs.length?`<table class="itbl"><tr style="color:var(--muted)"><td>Rev</td><td>Date</td><td>Description</td><td>Approved by</td></tr>${revs.map(r=>`<tr><td>${esc(r.rev)}</td><td>${esc(r.date)}</td><td>${esc(r.desc)}</td><td>${esc(r.by)}</td></tr>`).join('')}</table>`:'<p class="no-data">No revisions.</p>');

  // Website link
  if(p.id<600){html+=`<div class="sec"><a href="https://elwataniaplast.com/en/site/product/${id}" target="_blank" style="font-size:.78rem;color:var(--blue)">🔗 View on elwataniaplast.com</a></div>`;}

  document.getElementById('panel-body').innerHTML=html;
}

function ratioRowHtml(r,i){
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c','#e67e22','#34495e'];
  const c=r.color||COLORS[i%COLORS.length];
  return`<div class="ratio-row" id="rr-${i}">
    <input value="${esc(r.name)}" placeholder="Material name e.g. Copolymer M44" oninput="updateRatioPreview()">
    <input value="${esc(r.qty)}" placeholder="e.g. 3" oninput="updateRatioPreview()" style="max-width:80px">
    <span class="ratio-pct" id="rp-${i}"></span>
    <button class="del-btn" onclick="delRatioRow(${i})">✕</button>
  </div>`;
}
function stepRowHtml(s,i){return`<div style="display:flex;gap:.4rem;margin-bottom:.35rem" id="sr-${i}"><span style="font-size:.72rem;color:var(--muted);padding:.4rem .15rem;min-width:20px">${i+1}.</span><input class="ei" value="${esc(s)}" placeholder="Step ${i+1}" style="flex:1"><button class="del-btn" onclick="delStep(${i})">✕</button></div>`;}
function revRowHtml(r,i){return`<div style="display:grid;grid-template-columns:50px 105px 1fr 110px 28px;gap:.3rem;margin-bottom:.3rem" id="rvr-${i}"><input class="ei" value="${esc(r.rev)}" placeholder="0"><input class="ei" type="date" value="${esc(r.date)}"><input class="ei" value="${esc(r.desc)}" placeholder="Change description"><input class="ei" value="${esc(r.by)}" placeholder="Approved by"><button class="del-btn" onclick="delRev(${i})">✕</button></div>`;}

function addRatioRow(){const c=document.getElementById('ratio-rows');const i=c.children.length;const d=document.createElement('div');d.innerHTML=ratioRowHtml({name:'',qty:'1',color:''},i);c.appendChild(d.firstElementChild);updateRatioPreview();}
function delRatioRow(i){const el=document.getElementById('rr-'+i);if(el)el.remove();updateRatioPreview();}
function addStep(){const c=document.getElementById('step-rows');const i=c.children.length;const d=document.createElement('div');d.innerHTML=stepRowHtml('',i);c.appendChild(d.firstElementChild);}
function delStep(i){const el=document.getElementById('sr-'+i);if(el)el.remove();}
function addRev(){const c=document.getElementById('rev-rows');const i=c.children.length;const d=document.createElement('div');d.innerHTML=revRowHtml({rev:'',date:new Date().toISOString().slice(0,10),desc:'',by:SESSION.username},i);c.appendChild(d.firstElementChild);}
function delRev(i){const el=document.getElementById('rvr-'+i);if(el)el.remove();}

function updateRatioPreview(){
  const rows=getRatioRows();const total=rows.reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c','#e67e22','#34495e'];
  rows.forEach((r,i)=>{const pct=total?Math.round((parseFloat(r.qty)||0)/total*100):0;const el=document.getElementById('rp-'+i);if(el)el.textContent=pct+'%';});
  const bars=rows.map((r,i)=>`<div style="flex:${parseFloat(r.qty)||1};background:${COLORS[i%COLORS.length]}" title="${r.name||'?'}"></div>`).join('');
  const prev=document.getElementById('ratio-preview');if(prev)prev.innerHTML=rows.length?`<div class="ratio-bar">${bars}</div>`:'';
}
function getRatioRows(){
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c','#e67e22','#34495e'];
  const rows=[];document.querySelectorAll('[id^="rr-"]').forEach((el,i)=>{const ins=el.querySelectorAll('input');if(ins.length>=2)rows.push({name:ins[0].value,qty:ins[1].value,color:COLORS[i%COLORS.length]});});return rows;
}

// ── BOM ROW helpers ──────────────────────────────────────────────────
function bomRowHtml(row, i){

  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c'];
  const ratios = row.materialRatios || (mData.mat?[{name:mData.mat,qty:'1',color:COLORS[0]}]:[{name:'',qty:'1',color:COLORS[0]}]);
  const machines = (row.machines||mData.machines||[]).join(', ');
  const colours = (row.colours||mData.colours||[]).join(', ');
  return `<div class="bom-component" id="bom-${i}" data-dpidx="${row._dpIdx!==undefined?row._dpIdx:''}" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.75rem .8rem;margin-bottom:.65rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
      <span style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Component ${i+1}</span>
      <button class="del-btn" onclick="delBomRow(${i})">✕ Remove</button>
    </div>
    <div class="dp-link-box" style="margin-bottom:.6rem">
      <div class="dp-link-label">DataProducts link ${row._dpIdx!==undefined?'<span style="color:var(--green)">✓ linked</span>':'<span style="color:var(--muted)">not linked</span>'}</div>
      ${row._dpIdx!==undefined?`<div class="dp-link-val">${esc(MOULDS[row._dpIdx]?.n||'')} <button class="del-btn" onclick="unlinkBomRow(${i})" style="font-size:.65rem;padding:.15rem .35rem">✕ Unlink</button></div>`:''}
      <div class="dp-search-wrap">
        <input class="dp-search-input" id="dp-search-${i}" placeholder="Search DataProducts by name, mould code…" oninput="searchDPRow(this.value,${i})" autocomplete="off">
        <div class="dp-dropdown" id="dp-dd-${i}" style="display:none"></div>
      </div>
    </div>
    <div class="eg2" style="margin-bottom:.45rem">
      <div class="ef"><label class="el">Mould name / code</label><input class="ei" id="bom-mould-${i}" value="${esc(row.mouldName||mData.mc||mData.n||'')}"></div>
      <div class="ef"><label class="el">Cycle time (s)</label><input class="ei" id="bom-ct-${i}" value="${esc(row.cycleTime||mData.ct||'')}"></div>
    </div>
    <div class="eg3" style="margin-bottom:.45rem">
      <div class="ef"><label class="el">Pieces / cycle</label><input class="ei" id="bom-pc-${i}" value="${esc(row.piecesCycle||mData.pc||'')}"></div>
      <div class="ef"><label class="el">Part weight (kg)</label><input class="ei" id="bom-weight-${i}" value="${esc(row.partWeight||'')}" placeholder="e.g. 0.275"></div>
      <div class="ef"><label class="el">Machine availability</label><input class="ei" id="bom-machines-${i}" value="${esc(machines)}"></div>
    </div>
    <div class="ef" style="margin-bottom:.45rem"><label class="el">Colours (comma separated)</label><input class="ei" id="bom-colours-${i}" value="${esc(colours)}"></div>
    <div class="ef"><label class="el">Material mix (ratios)</label>
      <div style="display:grid;grid-template-columns:1fr 70px 60px 28px;gap:.3rem;font-size:.65rem;color:var(--muted);margin-bottom:.2rem"><span>Material name</span><span>Ratio</span><span>%</span><span></span></div>
      <div id="bom-ratios-${i}">${ratios.map((r,ri)=>ratioInBomHtml(r,i,ri)).join('')}</div>
      <button class="add-row-btn" onclick="addBomRatioRow(${i})" style="margin-top:.25rem">+ Add material</button>
      <div id="bom-ratio-bar-${i}" style="margin-top:.4rem"></div>

  </div>`;

function ratioInBomHtml(r,bomIdx,ri){
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c'];
  return `<div style="display:grid;grid-template-columns:1fr 70px 60px 28px;gap:.3rem;margin-bottom:.3rem" id="bom-ratio-${bomIdx}-${ri}">
    <input class="ei" value="${esc(r.name)}" placeholder="e.g. Copolymer M44" oninput="updateBomRatioBar(${bomIdx})">
    <input class="ei" value="${esc(r.qty)}" placeholder="3" oninput="updateBomRatioBar(${bomIdx})" style="font-family:monospace">
    <span id="bom-rpct-${bomIdx}-${ri}" style="font-size:.72rem;color:var(--muted);padding:.38rem .1rem;font-family:monospace"></span>
    <button class="del-btn" onclick="delBomRatioRow(${bomIdx},${ri})">✕</button>
  </div>`;
}

function addBomRow(){
  const c=document.getElementById('bom-rows');
  const i=c.querySelectorAll('.bom-component').length;
  const d=document.createElement('div');
  d.innerHTML=bomRowHtml({},i);
  c.appendChild(d.firstElementChild);
}
function delBomRow(i){const el=document.getElementById('bom-'+i);if(el)el.remove();}

function addBomRatioRow(bomIdx){
  const c=document.getElementById('bom-ratios-'+bomIdx);
  const ri=c.children.length;
  const d=document.createElement('div');
  d.innerHTML=ratioInBomHtml({name:'',qty:'1'},bomIdx,ri);
  c.appendChild(d.firstElementChild);
  updateBomRatioBar(bomIdx);
}
function delBomRatioRow(bomIdx,ri){const el=document.getElementById('bom-ratio-'+bomIdx+'-'+ri);if(el)el.remove();updateBomRatioBar(bomIdx);}

function updateBomRatioBar(bomIdx){
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c'];
  const rows=[...document.querySelectorAll('[id^="bom-ratio-'+bomIdx+'-"]')];
  const data=rows.map((el,ri)=>{const ins=el.querySelectorAll('input');return{name:ins[0]?.value,qty:parseFloat(ins[1]?.value)||0};});
  const total=data.reduce((a,r)=>a+r.qty,0);
  data.forEach((r,ri)=>{const pct=total?Math.round(r.qty/total*100):0;const el=document.getElementById('bom-rpct-'+bomIdx+'-'+ri);if(el)el.textContent=pct+'%';});
  const bars=data.map((r,ri)=>`<div style="flex:${r.qty||1};background:${COLORS[ri%COLORS.length]}" title="${r.name||'?'}"></div>`).join('');
  const bar=document.getElementById('bom-ratio-bar-'+bomIdx);
  if(bar)bar.innerHTML=data.length?`<div class="ratio-bar">${bars}</div>`:'';
}

function searchDPRow(q, bomIdx){
  const dd=document.getElementById('dp-dd-'+bomIdx);
  if(!q||q.length<1){dd.style.display='none';return;}
  const ql=q.toLowerCase();
  const matches=MOULDS.map((m,i)=>({m,i})).filter(({m})=>(m.n&&m.n.includes(q))||(m.mc&&m.mc.toLowerCase().includes(ql))||(m.g&&m.g.toLowerCase().includes(ql))).slice(0,20);
  if(!matches.length){dd.style.display='none';return;}
  dd.innerHTML=matches.map(({m,i})=>`<div class="dp-opt" onclick="selectDPRow(${i},${bomIdx})"><span class="dp-opt-name">${esc(m.n)}</span><span class="dp-opt-meta">${esc(m.mc)} · ${esc(m.g)} · ct:${m.ct}s pc:${m.pc}</span></div>`).join('');
  dd.style.display='block';
}
function selectDPRow(dpIdx, bomIdx){
  // Save link and re-render just this BOM row
  const m=MOULDS[dpIdx];
  document.getElementById('dp-search-'+bomIdx).value='';
  document.getElementById('dp-dd-'+bomIdx).style.display='none';
  // Update the bom component in place by replacing it
  const el=document.getElementById('bom-'+bomIdx);
  if(!el)return;
  const newRow={_dpIdx:dpIdx,mouldName:m.mc||m.n,cycleTime:m.ct,piecesCycle:m.pc,machines:m.machines||[],colours:m.colours||[],materialRatios:m.mat?[{name:m.mat,qty:'1'}]:[]};
  const d=document.createElement('div');
  d.innerHTML=bomRowHtml(newRow,bomIdx);
  const newEl=d.firstElementChild;
  newEl.setAttribute('data-dpidx',String(dpIdx));
  el.replaceWith(newEl);
  showToast('Linked: '+m.n);
}
function unlinkBomRow(bomIdx){
  const el=document.getElementById('bom-'+bomIdx);
  if(!el)return;
  const d=document.createElement('div');
  d.innerHTML=bomRowHtml({},bomIdx);
  el.replaceWith(d.firstElementChild);
}

function readBomRows(){
  const COLORS=['#4a90d9','#e2a83a','#5cb85c','#d9534f','#9b59b6','#1abc9c'];
  const rows=[];
  document.querySelectorAll('.bom-component').forEach((el,i)=>{
    const ratioEls=[...el.querySelectorAll('[id^="bom-ratio-'+i+'-"]')];
    const ratios=ratioEls.map((rel,ri)=>{const ins=rel.querySelectorAll('input');return{name:ins[0]?.value||'',qty:ins[1]?.value||'1',color:COLORS[ri%COLORS.length]};}).filter(r=>r.name);
    // Read _dpIdx from data attribute
    const dpIdxStr=el.getAttribute('data-dpidx');
    const dpIdx=dpIdxStr!==''&&dpIdxStr!==null?parseInt(dpIdxStr):undefined;
    rows.push({
      _dpIdx:dpIdx,
      mouldName:document.getElementById('bom-mould-'+i)?.value||'',
      cycleTime:document.getElementById('bom-ct-'+i)?.value||'',
      piecesCycle:document.getElementById('bom-pc-'+i)?.value||'',
      partWeight:document.getElementById('bom-weight-'+i)?.value||'',
      machines:(document.getElementById('bom-machines-'+i)?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
      colours:(document.getElementById('bom-colours-'+i)?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
      materialRatios:ratios,
    });
  });
  return rows;
}

function saveEdit(){
  const bom=readBomRows();
  const steps=[...document.querySelectorAll('[id^="sr-"]')].map(el=>el.querySelector('input')?.value||'').filter(Boolean);
  const revs=[...document.querySelectorAll('[id^="rvr-"]')].map(el=>{const ins=el.querySelectorAll('input');return{rev:ins[0]?.value,date:ins[1]?.value,desc:ins[2]?.value,by:ins[3]?.value};}).filter(r=>r.rev||r.desc);
  const pr=getProfile(currentPid);
  const p0=allProducts.find(x=>x.id===currentPid);
  const[arOld,dOld]=findBC(p0);
  const enVal=(document.getElementById('e_en_name')?.value||'').trim();
  const arVal=(document.getElementById('e_ar_name')?.value||'').trim();
  const codeVal=(document.getElementById('e_code')?.value||'').trim();
  const barcodeVal=(document.getElementById('e_barcode')?.value||'').trim();
  const catVal=(document.getElementById('e_category')?.value||'').trim();
  const subVal=(document.getElementById('e_subcategory')?.value||'').trim();
  const imgVal=document.getElementById('e_image_data')?.value||'';
  // ── snapshot OLD effective values for the audit trail ──
  const notesEl=document.getElementById('e_notes'),wEl=document.getElementById('e_weight'),
        dimEl=document.getElementById('e_dims'),volEl=document.getElementById('e_volume'),
        pkgI=document.getElementById('e_pkg_inner'),pkgC=document.getElementById('e_pkg_carton'),
        pkgP=document.getElementById('e_pkg_pallet'),pkgU=document.getElementById('e_pkg_units'),
        qD=document.getElementById('e_q_dim'),qV=document.getElementById('e_q_vis'),qF=document.getElementById('e_q_func');
  const pkgOld=pr.packaging||{},qOld=pr.quality||{};
  const oldVals={
    'English name':p0?p0.en:'', 'Arabic name':pr._arName||arOld||'',
    'internal code':pr._codeOverride||(dOld&&(dOld.codes||[])[0])||'',
    'barcode':pr._barcodeOverride||(dOld&&(dOld.bc||[])[0])||'',
    'category':p0?p0.cat:'', 'subcategory':p0?p0.sub:'',
    'notes':pr.notes||'', 'weight':pr.weight||'', 'dimensions':pr.dimensions||'', 'volume':pr.volume||'',
    'inner packaging':pkgOld.inner||'', 'carton':pkgOld.carton||'', 'pallet config':pkgOld.pallet||'', 'units/pallet':pkgOld.unitsPerPallet||'',
    'tolerances':qOld.dimTol||'', 'visual criteria':qOld.visual||'', 'functional tests':qOld.functional||'',
    'product image':pr._image?'(image set)':'(none)'
  };
  const newVals={
    'English name':enVal, 'Arabic name':arVal, 'internal code':codeVal, 'barcode':barcodeVal,
    'category':catVal, 'subcategory':subVal,
    'notes':notesEl?notesEl.value:'', 'weight':wEl?wEl.value:'', 'dimensions':dimEl?dimEl.value:'', 'volume':volEl?volEl.value:'',
    'inner packaging':pkgI?pkgI.value:'', 'carton':pkgC?pkgC.value:'', 'pallet config':pkgP?pkgP.value:'', 'units/pallet':pkgU?pkgU.value:'',
    'tolerances':qD?qD.value:'', 'visual criteria':qV?qV.value:'', 'functional tests':qF?qF.value:'',
    'product image':imgVal?'(image set)':'(none)'
  };
  const fieldChanges=[];
  Object.keys(newVals).forEach(k=>{ if(String(oldVals[k]||'')!==String(newVals[k]||'')) fieldChanges.push({field:k,from:oldVals[k]||'—',to:newVals[k]||'—'}); });
  const idOverrides={};
  // Only store an English-name override when it actually differs from the website name
  const baseEn=(p0&&p0._origEn!==undefined)?p0._origEn:(p0?p0.en:'');
  if(enVal&&enVal!==baseEn)idOverrides._enName=enVal;
  if(arVal)idOverrides._arName=arVal;
  if(codeVal)idOverrides._codeOverride=codeVal;
  if(barcodeVal)idOverrides._barcodeOverride=barcodeVal;
  const baseCat=(p0&&p0._origCat!==undefined)?p0._origCat:(p0?p0.cat:'');
  const baseSub=(p0&&p0._origSub!==undefined)?p0._origSub:(p0?p0.sub:'');
  if(catVal&&catVal!==baseCat)idOverrides._catOverride=catVal;
  if(subVal&&subVal!==baseSub)idOverrides._subOverride=subVal;
  const data={
    ...pr,
    ...idOverrides,
    notes:document.getElementById('e_notes')?.value||'',
    weight:document.getElementById('e_weight')?.value||'',
    dimensions:document.getElementById('e_dims')?.value||'',
    volume:document.getElementById('e_volume')?.value||'',
    bom,
    packaging:{inner:document.getElementById('e_pkg_inner')?.value||'',carton:document.getElementById('e_pkg_carton')?.value||'',pallet:document.getElementById('e_pkg_pallet')?.value||'',unitsPerPallet:document.getElementById('e_pkg_units')?.value||''},
    quality:{dimTol:document.getElementById('e_q_dim')?.value||'',visual:document.getElementById('e_q_vis')?.value||'',functional:document.getElementById('e_q_func')?.value||''},
    assemblySteps:steps,revisions:revs,
    _lastEditBy:SESSION.username,
    _lastEditAt:new Date().toLocaleString('en-GB'),
  };
  if(imgVal)data._image=imgVal; else delete data._image;
  saveProfile(currentPid,data);
  applyOverrides();
  const pName=allProducts.find(x=>x.id===currentPid)?.en||currentPid;
  if(fieldChanges.length)logChanges(pName,fieldChanges);
  else logActivity('edited profile',pName);
  unsaved=false;editMode=false;
  document.getElementById('edit-btn').textContent='✏ Edit';document.getElementById('edit-btn').classList.remove('active');
  renderView(currentPid);updateCounts();renderGrid();
  showToast('✓ Profile saved');
}

// ══ TRASH ════════════════════════════════════════════════════════════
function trashProduct(){
  showConfirm('Move to trash?','This product will be moved to the trash bin. You can restore it later.',()=>{
    const pr=getProfile(currentPid);pr._trashed=true;pr._trashedBy=SESSION.username;pr._trashedAt=new Date().toLocaleString('en-GB');
    saveProfile(currentPid,pr);logActivity('moved to trash',allProducts.find(x=>x.id===currentPid)?.en||currentPid);
    closePanel();updateCounts();renderGrid();showToast('Moved to trash');
  });
}
function restoreProduct(){
  const pr=getProfile(currentPid);delete pr._trashed;delete pr._trashedBy;delete pr._trashedAt;
  saveProfile(currentPid,pr);logActivity('restored from trash',allProducts.find(x=>x.id===currentPid)?.en||currentPid);
  closePanel();updateCounts();renderGrid();showToast('Restored');
}
function permDeleteProduct(){
  showConfirm('Permanently delete?','This cannot be undone. The product will be gone forever.',()=>{
    const s=getStore();delete s[currentPid];
    allProducts=allProducts.filter(p=>p.id!==currentPid);
    // Remove from custom products too
    if(s._customProducts)s._customProducts=s._customProducts.filter(p=>p.id!==currentPid);
    saveStore(s);logActivity('permanently deleted',currentPid);
    closePanel();buildCatList();updateCounts();renderGrid();showToast('Permanently deleted');
  });
}

// ══ ADD PRODUCT ═══════════════════════════════════════════════════════
function openAddProduct(){document.getElementById('add-modal').classList.add('open');}
function saveNewProduct(){
  const name=document.getElementById('np-name').value.trim();
  if(!name){alert('Product name is required.');return;}
  const newId='custom_'+Date.now();
  const np={id:newId,en:name,cat:document.getElementById('np-cat').value,sub:document.getElementById('np-sub').value||document.getElementById('np-cat').value,_custom:true};
  allProducts.push(np);
  const s=getStore();
  if(!s._customProducts)s._customProducts=[];
  s._customProducts.push(np);
  // Save any initial barcode/code info
  const code=document.getElementById('np-code').value.trim();
  const barcode=document.getElementById('np-barcode').value.trim();
  const ar=document.getElementById('np-ar').value.trim();
  if(code||barcode||ar){s[newId]={_arName:ar||undefined,_codeOverride:code||undefined,_barcodeOverride:barcode||undefined,_lastEditBy:SESSION.username,_lastEditAt:new Date().toLocaleString('en-GB')};}
  saveStore(s);
  logActivity('added new product',name);
  closeModal('add-modal');buildCatList();updateCounts();renderGrid();
  showToast('Product created');
  // Clear form
  ['np-name','np-sub','np-code','np-barcode','np-ar'].forEach(id=>{document.getElementById(id).value='';});
}

// ══ ACTIVITY LOG ══════════════════════════════════════════════════════
function logActivity(action,target){
  const s=getStore();
  if(!s._log)s._log=[];
  s._log.unshift({user:SESSION.username,action,target:String(target),time:new Date().toLocaleString('en-GB')});
  if(s._log.length>500)s._log=s._log.slice(0,500);
  saveStore(s);
}
function openLog(){
  const s=getStore();const log=s._log||[];
  const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<div style="padding:1rem;text-align:center;color:var(--muted);font-size:.82rem">No activity yet.</div>';document.getElementById('log-modal').classList.add('open');return;}
  el.innerHTML=log.map(l=>`<div class="log-row"><span class="log-user">${esc(l.user)}</span><span class="log-action">${esc(l.action)} — <em>${esc(l.target)}</em></span><span class="log-time">${esc(l.time)}</span></div>`).join('');
  document.getElementById('log-modal').classList.add('open');
}

// ══ SETTINGS / USER MANAGEMENT ═══════════════════════════════════════
function openSettings(){renderUsersList();document.getElementById('settings-panel').classList.add('open');}
function closeSettings(){document.getElementById('settings-panel').classList.remove('open');}
function renderUsersList(){
  const s=getStore();const users=s._users||[];
  document.getElementById('users-list').innerHTML=users.map((u,i)=>`<div class="user-row">
    <div class="user-name">${esc(u.username)}</div>
    <span class="user-role ${u.role==='admin'?'role-admin':'role-viewer'}">${u.role}</span>
    ${u.username!==SESSION.username?`<button class="toggle-role" onclick="toggleUserRole(${i})">Toggle role</button><button class="del-user-btn" onclick="deleteUser(${i})">Remove</button>`:'<span style="font-size:.7rem;color:var(--muted)">(you)</span>'}
  </div>`).join('');
}
function toggleUserRole(i){const s=getStore();const u=s._users[i];u.role=u.role==='admin'?'viewer':'admin';saveStore(s);renderUsersList();logActivity('changed role of',u.username+' to '+u.role);}
function deleteUser(i){const s=getStore();const u=s._users[i];if(!confirm('Remove user '+u.username+'?'))return;s._users.splice(i,1);saveStore(s);renderUsersList();logActivity('removed user',u.username);}
async function addUser(){
  const uname=document.getElementById('new-username').value.trim().toLowerCase();
  const pw=document.getElementById('new-password').value;
  const role=document.getElementById('new-role').value;
  if(!uname||!pw){alert('Username and password required.');return;}
  const s=getStore();const users=s._users||[];
  if(users.find(u=>u.username===uname)){alert('Username already exists.');return;}
  const h=await sha256(pw);
  users.push({username:uname,hash:h,role});s._users=users;saveStore(s);
  document.getElementById('new-username').value='';document.getElementById('new-password').value='';
  renderUsersList();logActivity('added user',uname+' ('+role+')');showToast('User added: '+uname);
}

// ══ PRINT ════════════════════════════════════════════════════════════
function openPrint(){
  const id=currentPid;const p=allProducts.find(x=>x.id===id);
  const[ar,d]=findBC(p);const[,md]=findMould(p);const pr=getProfile(id);
  const today=new Date().toLocaleDateString('en-GB');
  const mData=md||{};
  const ratios=pr.materialRatios||(mData.mat?[{name:mData.mat,qty:'1'}]:[]);
  const total=ratios.reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
  const colours=(pr.colours&&pr.colours.length)?pr.colours:mData.colours||[];
  const machines=(pr.machines&&pr.machines.length)?pr.machines:mData.machines||[];
  const imgUrl2=imgUrl(id,530);
  const rev=((pr.revisions||[]).slice(-1)[0]||{}).rev||'0';

  let html=`<div class="pc-hdr">
    ${imgUrl2?`<img src="${imgUrl2}" style="float:right;width:35mm;height:35mm;object-fit:contain;border:1pt solid #ddd;border-radius:3pt;margin-left:8mm">`:''}
    <div>
      <div class="pc-logo">Al Watania <span style="color:#111">Plast</span></div>
      <div class="pc-title">${esc(p.en)}</div>
      <div style="font-size:8.5pt;color:#666;display:flex;gap:.8rem;flex-wrap:wrap">
        <span>${esc(p.cat)} › ${esc(p.sub)}</span>
        ${ar?`<span>AR: ${esc(ar)}</span>`:''}
        <span>ID: #${id}</span>
      </div>
    </div>
    <div style="text-align:right;font-size:8.5pt;color:#666;flex-shrink:0">
      <div style="font-weight:700;font-size:10pt;color:#c94c28">Product Profile</div>
      <div>Date: ${today}</div><div>Rev: ${rev}</div>
      <div>By: ${SESSION.username}</div>
    </div>
  </div>`;

  html+=`<div class="pc-grid2">
    <div class="pc-sec"><div class="pc-sec-title">Identification</div><table class="pc-tbl">
      ${d?d.codes.map((c,i)=>`<tr><td>Code</td><td style="font-family:monospace">${c}</td></tr><tr><td>Barcode</td><td style="font-family:monospace">${(d.bc||[])[i]||''}</td></tr>`).join(''):'<tr><td colspan="2" class="pnf">No barcode data</td></tr>'}
    </table></div>
    <div class="pc-sec"><div class="pc-sec-title">Specifications</div><table class="pc-tbl">
      <tr><td>Weight</td><td>${pr.weight||'<span class="pnf">—</span>'} kg</td></tr>
      <tr><td>Dimensions</td><td>${pr.dimensions||'<span class="pnf">—</span>'}</td></tr>
      <tr><td>Volume</td><td>${pr.volume||'<span class="pnf">—</span>'} cm³</td></tr>
    </table></div>
  </div>`;

  if(md||pr._dpIdx!==undefined){
    html+=`<div class="pc-sec"><div class="pc-sec-title">Production data</div>
      <div class="pc-grid2">
        <div class="pc-box"><div class="pc-box-lbl">Mould name</div><div class="pc-box-val">${esc(pr.mouldName||mData.mc||mData.n||'—')}</div></div>
        <div class="pc-box"><div class="pc-box-lbl">Cycle time</div><div class="pc-box-val">${esc(!empty(pr.cycleTime)?pr.cycleTime:mData.ct||'—')}s</div></div>
        <div class="pc-box"><div class="pc-box-lbl">Pieces / cycle</div><div class="pc-box-val">${esc(!empty(pr.piecesCycle)?pr.piecesCycle:mData.pc||'—')}</div></div>
        <div class="pc-box"><div class="pc-box-lbl">Part weight</div><div class="pc-box-val">${bom[0]?.partWeight?bom[0].partWeight+' kg':'—'}</div></div>
        <div class="pc-box"><div class="pc-box-lbl">Machines</div><div class="pc-box-val" style="font-size:.85rem">${machines.length?machines.join(', '):'—'}</div></div>
      </div>
      ${ratios.length?`<div style="margin-top:3mm"><div class="pc-box-lbl" style="margin-bottom:1.5mm">Material mix</div>${ratios.map(r=>{const pct=total?Math.round((parseFloat(r.qty)||0)/total*100):0;return`<div style="font-size:8pt;margin-bottom:1mm">${esc(r.name)} — ratio ${esc(r.qty)} (${pct}%)</div>`;}).join('')}</div>`:''}
      ${colours.length?`<div style="margin-top:2mm"><div class="pc-box-lbl">Colours</div><div style="font-size:8pt">${colours.map(c=>esc(c)).join(', ')}</div></div>`:''}

  }

  const pkg=pr.packaging||{};
  html+=`<div class="pc-grid2">
    <div class="pc-sec"><div class="pc-sec-title">Packaging</div><table class="pc-tbl">
      <tr><td>Inner</td><td>${pkg.inner||'<span class="pnf">—</span>'}</td></tr>
      <tr><td>Carton</td><td>${pkg.carton||'<span class="pnf">—</span>'}</td></tr>
      <tr><td>Pallet</td><td>${pkg.pallet||'<span class="pnf">—</span>'}</td></tr>

  const steps=pr.assemblySteps||[];

  html+=`<div class="pc-footer"><span>Al Watania Plast — Product Profile System</span><span>${esc(p.cat)}</span><span>Printed: ${today}</span></div>`;

  document.getElementById('print-card').innerHTML=html;
  document.getElementById('print-overlay').classList.add('open');
}
function closePrint(){document.getElementById('print-overlay').classList.remove('open');}

// ══ MODALS / HELPERS ══════════════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showConfirm(title,msg,onOk){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok').onclick=()=>{closeModal('confirm-modal');onOk();};
  document.getElementById('confirm-modal').classList.add('open');
}
function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},2200);
}
function exportAll(){
  const s=getStore();
  const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),profiles:s},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='awp_profiles_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
