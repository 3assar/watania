<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Al Watania Plast</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      Al Watania <span>Plast</span>
      <br><small style="font-size:.65rem;color:var(--muted);font-weight:400;letter-spacing:.05em">Production Management System</small>
    </div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="lu" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="lp" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
function showApp() {
  if (SESSION && SESSION.role === 'supervisor') {
    window.location.href = 'production.html';
  } else {
    window.location.href = 'library.html';
  }
}

initAuth(showApp, () => { /* login screen is visible by default via CSS */ });
</script>

</body>
</html>
